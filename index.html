<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glosario Transversal — Spin</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F5F2EC;
  --surface: #FFFFFF;
  --surface2: #EDE9E0;
  --border: #D8D2C4;
  --text: #1A1814;
  --text2: #6B6456;
  --text3: #9B9080;
  --green: #1A5C3A;
  --green-light: #E8F2EC;
  --red: #8B2020;
  --red-light: #F9EDED;
  --amber: #7A4A0A;
  --amber-light: #FDF4E7;
  --blue: #1A3A5C;
  --blue-light: #EBF0F7;
  --accent: #2D7A50;
  --tag-border: #C8C0B0;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: "DM Sans", sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 15px;
  line-height: 1.6;
  min-height: 100vh;
}

/* ── HEADER ── */
.site-header {
  background: var(--text);
  padding: 0 2rem;
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
  height: 56px;
  border-bottom: 1px solid #333;
}
.logo {
  font-family: "DM Mono", monospace;
  font-size: 13px;
  font-weight: 500;
  color: #F5F2EC;
  letter-spacing: 0.08em;
  white-space: nowrap;
}
.logo span { color: #6FCF97; }
.header-search {
  flex: 1;
  max-width: 420px;
  position: relative;
}
.header-search input {
  width: 100%;
  background: #2A2622;
  border: 1px solid #444;
  border-radius: 6px;
  padding: 7px 12px 7px 36px;
  color: #F5F2EC;
  font-family: "DM Sans", sans-serif;
  font-size: 13px;
  outline: none;
  transition: border-color 0.2s;
}
.header-search input::placeholder { color: #777; }
.header-search input:focus { border-color: #6FCF97; }
.header-search svg {
  position: absolute;
  left: 11px;
  top: 50%;
  transform: translateY(-50%);
  color: #777;
  pointer-events: none;
}
.header-actions { display: flex; gap: 8px; }
.btn-sm {
  font-family: "DM Mono", monospace;
  font-size: 11px;
  letter-spacing: 0.06em;
  padding: 6px 12px;
  border-radius: 4px;
  border: 1px solid #444;
  background: transparent;
  color: #C8C0B0;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.btn-sm:hover { background: #2A2622; color: #F5F2EC; border-color: #666; }
.btn-sm.active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* ── LAYOUT ── */
.layout { display: flex; min-height: calc(100vh - 56px); }

/* ── SIDEBAR ── */
.sidebar {
  width: 220px;
  flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 1.5rem 0;
  position: sticky;
  top: 56px;
  height: calc(100vh - 56px);
  overflow-y: auto;
}
.sidebar-section { padding: 0 1rem 1.5rem; }
.sidebar-label {
  font-family: "DM Mono", monospace;
  font-size: 10px;
  letter-spacing: 0.12em;
  color: var(--text3);
  text-transform: uppercase;
  margin-bottom: 6px;
  padding: 0 4px;
}
.sidebar-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  width: 100%;
  padding: 7px 10px;
  border-radius: 6px;
  border: none;
  background: transparent;
  color: var(--text2);
  font-family: "DM Sans", sans-serif;
  font-size: 13px;
  cursor: pointer;
  text-align: left;
  transition: all 0.15s;
  margin-bottom: 2px;
}
.sidebar-btn:hover { background: var(--surface2); color: var(--text); }
.sidebar-btn.active { background: var(--green-light); color: var(--green); font-weight: 500; }
.sidebar-btn .dot {
  width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
}
.dot-green { background: var(--accent); }
.dot-blue { background: var(--blue); }
.dot-red { background: var(--red); }
.dot-gray { background: #888; }
.dot-amber { background: var(--amber); }
.sidebar-divider { border: none; border-top: 1px solid var(--border); margin: 0.5rem 1rem 1rem; }
.count-pill {
  margin-left: auto;
  font-family: "DM Mono", monospace;
  font-size: 10px;
  background: var(--surface2);
  padding: 1px 6px;
  border-radius: 10px;
  color: var(--text3);
}

/* ── MAIN ── */
.main { flex: 1; padding: 2rem; min-width: 0; }
.section-header {
  display: flex;
  align-items: baseline;
  gap: 12px;
  margin-bottom: 1.5rem;
}
.section-title {
  font-family: "DM Mono", monospace;
  font-size: 20px;
  font-weight: 500;
  color: var(--text);
}
.section-count {
  font-family: "DM Mono", monospace;
  font-size: 12px;
  color: var(--text3);
}

/* ── TABLE ── */
.table-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
}
table { width: 100%; border-collapse: collapse; }
thead { background: var(--surface2); }
th {
  padding: 10px 14px;
  text-align: left;
  font-family: "DM Mono", monospace;
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text3);
  border-bottom: 1px solid var(--border);
  font-weight: 500;
  white-space: nowrap;
}
td {
  padding: 11px 14px;
  font-size: 13px;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
  line-height: 1.5;
}
tr:last-child td { border-bottom: none; }
tr:hover td { background: #FAFAF7; }
.term { font-weight: 500; color: var(--text); }
.avoid { color: var(--red); font-size: 12px; }
.example { color: var(--text2); font-size: 12px; }
.date { font-family: "DM Mono", monospace; font-size: 11px; color: var(--text3); white-space: nowrap; }
.tag {
  display: inline-block;
  font-family: "DM Mono", monospace;
  font-size: 10px;
  padding: 2px 7px;
  border-radius: 3px;
  border: 1px solid var(--tag-border);
  background: var(--surface2);
  color: var(--text2);
  white-space: nowrap;
}
.tag-legal { background: var(--red-light); color: var(--red); border-color: #E8C0C0; }
.tag-acc { background: var(--blue-light); color: var(--blue); border-color: #C0D0E0; }
.tag-def { background: var(--amber-light); color: var(--amber); border-color: #E8D0A0; }

tr.legal-row td { background: #FFFBF5; }
tr.legal-row:hover td { background: #FFF7ED; }

.empty {
  padding: 3rem 2rem;
  text-align: center;
  color: var(--text3);
  font-family: "DM Mono", monospace;
  font-size: 13px;
}

/* ── AI PANEL ── */
.ai-panel {
  background: var(--text);
  border-radius: 10px;
  padding: 1.5rem;
  margin-bottom: 1.5rem;
  display: none;
}
.ai-panel.open { display: block; }
.ai-panel-title {
  font-family: "DM Mono", monospace;
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #6FCF97;
  margin-bottom: 0.75rem;
}
.ai-input-row { display: flex; gap: 8px; }
.ai-input-row input {
  flex: 1;
  background: #2A2622;
  border: 1px solid #444;
  border-radius: 6px;
  padding: 9px 14px;
  color: #F5F2EC;
  font-family: "DM Sans", sans-serif;
  font-size: 13px;
  outline: none;
}
.ai-input-row input:focus { border-color: #6FCF97; }
.ai-input-row input::placeholder { color: #666; }
.btn-ask {
  background: var(--accent);
  border: none;
  border-radius: 6px;
  padding: 9px 18px;
  color: #fff;
  font-family: "DM Mono", monospace;
  font-size: 11px;
  letter-spacing: 0.06em;
  cursor: pointer;
  white-space: nowrap;
  transition: opacity 0.15s;
}
.btn-ask:hover { opacity: 0.85; }
.btn-ask:disabled { opacity: 0.4; cursor: default; }
.ai-response {
  margin-top: 1rem;
  padding: 1rem;
  background: #2A2622;
  border-radius: 6px;
  font-size: 13px;
  color: #E8E0D0;
  line-height: 1.7;
  white-space: pre-wrap;
  display: none;
}
.ai-response.visible { display: block; }

/* ── ADD FORM ── */
.add-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1.5rem;
  margin-bottom: 1.5rem;
  display: none;
}
.add-panel.open { display: block; }
.add-panel-title {
  font-family: "DM Mono", monospace;
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 1rem;
}
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.form-grid input, .form-grid select, .add-panel input[type=text] {
  width: 100%;
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--bg);
  color: var(--text);
  font-family: "DM Sans", sans-serif;
  font-size: 13px;
  outline: none;
}
.form-grid input:focus, .add-panel input:focus { border-color: var(--accent); }
.form-full { grid-column: 1 / -1; }
.btn-save {
  background: var(--accent);
  border: none;
  border-radius: 6px;
  padding: 8px 18px;
  color: #fff;
  font-family: "DM Mono", monospace;
  font-size: 11px;
  letter-spacing: 0.06em;
  cursor: pointer;
  margin-top: 6px;
  transition: opacity 0.15s;
}
.btn-save:hover { opacity: 0.85; }

/* ── LEGAL PAGE ── */
.legal-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 12px;
}
.legal-card-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  background: var(--red-light);
  border-bottom: 1px solid #E8C8C8;
}
.legal-avoid { font-weight: 500; font-size: 14px; color: var(--red); }
.legal-card-body { padding: 12px 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.legal-field label {
  font-family: "DM Mono", monospace;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text3);
  display: block;
  margin-bottom: 3px;
}
.legal-field p { font-size: 13px; color: var(--text); }

/* ── DEFS PAGE ── */
.def-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1.25rem 1.5rem;
  margin-bottom: 10px;
}
.def-term { font-weight: 500; font-size: 15px; color: var(--text); margin-bottom: 8px; }
.def-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.def-field label {
  font-family: "DM Mono", monospace;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text3);
  display: block;
  margin-bottom: 3px;
}
.def-field p { font-size: 12px; color: var(--text2); line-height: 1.5; }
.def-conclusion { color: var(--green) !important; font-weight: 500; }

/* ── PENDING PAGE ── */
.pending-form {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1.5rem;
  margin-bottom: 1.5rem;
}
.pending-form-title {
  font-family: "DM Mono", monospace;
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 1rem;
}
.pending-form input, .pending-form textarea {
  width: 100%;
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--bg);
  color: var(--text);
  font-family: "DM Sans", sans-serif;
  font-size: 13px;
  outline: none;
  margin-bottom: 8px;
  resize: vertical;
}
.pending-form input:focus, .pending-form textarea:focus { border-color: var(--accent); }
.pending-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin-bottom: 8px;
  display: flex;
  gap: 1rem;
  align-items: flex-start;
}
.pending-item-term { font-weight: 500; font-size: 14px; color: var(--text); }
.pending-item-desc { font-size: 12px; color: var(--text2); margin-top: 2px; }
.pending-meta { font-family: "DM Mono", monospace; font-size: 11px; color: var(--text3); white-space: nowrap; }
.status-pill {
  display: inline-block;
  font-family: "DM Mono", monospace;
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 3px;
  margin-top: 4px;
}
.status-pending { background: var(--amber-light); color: var(--amber); }

/* ── RESPONSIVE ── */
@media (max-width: 768px) {
  .sidebar { display: none; }
  .main { padding: 1rem; }
  .form-grid, .legal-card-body, .def-grid { grid-template-columns: 1fr; }
  .logo { font-size: 11px; }
}
</style>
</head>

let currentSection = 'glossary';
let currentProduct = 'all';
let searchQuery = '';

function onSearch() {
  searchQuery = document.getElementById('globalSearch').value.toLowerCase();
  renderSection();
}

function showSection(sec, btn) {
  currentSection = sec;
  document.querySelectorAll('.sidebar-btn').forEach(b => {
    if (['all','Spin by OXXO','Spin Premia','Spin Negocios'].includes(b.dataset.prod)) return;
    b.classList.remove('active');
  });
  if (btn) btn.classList.add('active');
  renderSection();
}

function setProduct(prod, btn) {
  currentProduct = prod;
  document.querySelectorAll('.sidebar-btn[data-prod]').forEach(b => b.classList.remove('active'));
  if (btn) { btn.dataset.prod = prod; btn.classList.add('active'); }
  renderSection();
}

document.querySelectorAll('.sidebar-btn').forEach((b, i) => {
  if (i >= 6) b.dataset.prod = ['all','Spin by OXXO','Spin Premia','Spin Negocios'][i-6];
});

function updateCounts() {
  document.getElementById('cnt-glossary').textContent = DATA.glossary.length;
  document.getElementById('cnt-definitions').textContent = DATA.definitions.length;
  document.getElementById('cnt-legal').textContent = DATA.legal.length;
  document.getElementById('cnt-accessibility').textContent = DATA.accessibility.length;
  document.getElementById('cnt-pending').textContent = DATA.pending.length;
}

function filterGlossary() {
  return DATA.glossary.filter(r => {
    const matchQ = !searchQuery || (r[0]+r[1]+r[2]+r[3]).toLowerCase().includes(searchQuery);
    const matchP = currentProduct === 'all' || r[3].toLowerCase().includes(currentProduct.toLowerCase()) || r[3] === 'Ambos' || r[3] === '—';
    return matchQ && matchP;
  });
}

function renderSection() {
  updateCounts();
  const main = document.getElementById('mainContent');
  const aiOpen = document.getElementById('aiPanel') && document.getElementById('aiPanel').classList.contains('open');
  const addOpen = document.getElementById('addPanel') && document.getElementById('addPanel').classList.contains('open');

  if (currentSection === 'glossary') renderGlossary(main, aiOpen, addOpen);
  else if (currentSection === 'definitions') renderDefinitions(main);
  else if (currentSection === 'legal') renderLegal(main);
  else if (currentSection === 'accessibility') renderAccessibility(main);
  else if (currentSection === 'pending') renderPending(main);
}

  main.innerHTML = `

    </div>

function toggleAI() {
  const panel = document.getElementById('aiPanel');
  if (panel) {
    panel.classList.toggle('open');
    document.getElementById('btnAI').classList.toggle('active');
  } else {
    showSection('glossary', document.querySelector('.sidebar-btn'));
    setTimeout(() => {
      const p = document.getElementById('aiPanel');
      if (p) { p.classList.add('open'); document.getElementById('btnAI').classList.add('active'); }
    }, 50);
  }
}

function toggleAdd() {
  window.open('https://docs.google.com/forms/d/e/1FAIpQLSeaAk878QdAJqPrRTuIXyrBfnqhYTeUb9I9TRiEammV9lcnFQ/viewform', '_blank');
}

function saveNew() {
  const u = document.getElementById('nUsamos').value.trim();
  if (!u) return;
  DATA.glossary.push([
    u,
    document.getElementById('nEvitamos').value.trim() || '—',
    document.getElementById('nComo').value.trim() || '—',
    document.getElementById('nProducto').value.trim() || 'Ambos',
    document.getElementById('nFecha').value.trim() || new Date().toLocaleDateString('es-MX'),
    ''
  ]);
  renderSection();
}

function addPending() {
  const t = document.getElementById('pTerm').value.trim();
  if (!t) return;
  DATA.pending.push({
    term: t,
    desc: document.getElementById('pDesc').value.trim() || '—',
    author: document.getElementById('pAuthor').value.trim() || 'Anónimo',
    date: new Date().toLocaleDateString('es-MX')
  });
  renderSection();
}

async function askAI() {
  const q = document.getElementById('aiInput').value.trim();
  if (!q) return;
  const btn = document.getElementById('btnAsk');
  const resp = document.getElementById('aiResponse');
  btn.disabled = true; btn.textContent = '…';
  resp.classList.add('visible'); resp.textContent = 'Consultando el glosario…';
  const ctx = DATA.glossary.map(r => `TÉRMINO: ${r[0]} | EVITAR: ${r[1]} | EJEMPLO: ${r[2]} | APLICA A: ${r[3]}`).join('\n');
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: `Eres el asistente del Glosario Transversal de Spin by OXXO y Spin Premia, fintech mexicana. Responde preguntas sobre terminología usando el glosario. Si un término tiene riesgo legal, menciónalo con ⚠️. Sé conciso. Responde en español.\n\nGLOSARIO:\n${ctx}`,
        messages: [{ role: 'user', content: q }]
      })
    });
    const d = await res.json();
    resp.textContent = d.content?.[0]?.text || 'Sin respuesta.';
  } catch(e) { resp.textContent = 'Error al consultar. Inténtalo de nuevo.'; }
  btn.disabled = false; btn.textContent = 'Preguntar';
}

function exportCSV() {
  const headers = ['Usamos','Evitamos','Cómo usarlo','Aplica a','Última actualización','Riesgo legal'];
  const rows = DATA.glossary.map(r => r.map(v => `"${String(v).replace(/"/g,'\"')}"` ).join(','));
  const csv = '\uFEFF' + [headers.join(','), ...rows].join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = 'glosario-spin.csv'; a.click();
}

renderSection();
</script>
